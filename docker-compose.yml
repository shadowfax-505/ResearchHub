version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=researchhub
      - DB_USER=researchhub_user
      - DB_PASSWORD=researchhub_secure_password
      - NODE_ENV=development
      - API_PORT=3000
    depends_on:
      - db
    volumes:
      - ./api:/app/api

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: researchhub
      MYSQL_USER: researchhub_user
      MYSQL_PASSWORD: researchhub_secure_password
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d

volumes:
  db_data:
